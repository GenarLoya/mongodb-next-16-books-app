info:
  name: add book
  type: http
  seq: 2

http:
  method: POST
  url: "{{BASE_URL}}/books"
  body:
    type: json
    data: |-
      {
        "title": "Alice in wonderland",
        "author": "Lewis Carroll"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
